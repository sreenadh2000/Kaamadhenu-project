<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Adding Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Inter:wght@400;500&family=Source+Sans+Pro:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <title>proud-formers-client</title>
    <script>
      // Prevent theme flicker before React loads
      (function () {
        const path = window.location.pathname;
        const isAdmin = path.startsWith("/admin");
        document.documentElement.classList.add(
          isAdmin ? "admin-theme" : "user-theme"
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
